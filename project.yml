name: Ouch
options:
  bundleIdPrefix: com.ouchapp
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    TARGETED_DEVICE_FAMILY: "1"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

targets:

  # ──────────────────────────────────────────────
  # Main App
  # ──────────────────────────────────────────────
  Ouch:
    type: application
    platform: iOS
    sources:
      - path: Ouch
        excludes:
          - "**/.DS_Store"
      - path: Shared
    settings:
      base:
        INFOPLIST_FILE: Ouch/Info.plist
        CODE_SIGN_ENTITLEMENTS: Ouch/Ouch.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.ouchapp.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_ASSET_PATHS: "\"Ouch/Preview Content\""
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        SWIFT_STRICT_CONCURRENCY: complete
    dependencies:
      - target: DeviceActivityMonitorExtension
      - target: ShieldConfigurationExtension
      - target: ShieldActionExtension
    entitlements:
      path: Ouch/Ouch.entitlements
    info:
      path: Ouch/Info.plist

  # ──────────────────────────────────────────────
  # Device Activity Monitor Extension
  # ──────────────────────────────────────────────
  DeviceActivityMonitorExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: DeviceActivityMonitorExtension
      - path: Shared
    settings:
      base:
        INFOPLIST_FILE: DeviceActivityMonitorExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: DeviceActivityMonitorExtension/DeviceActivityMonitorExtension.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.ouchapp.app.device-activity-monitor
        GENERATE_INFOPLIST_FILE: true
        SWIFT_STRICT_CONCURRENCY: complete
    entitlements:
      path: DeviceActivityMonitorExtension/DeviceActivityMonitorExtension.entitlements
    info:
      path: DeviceActivityMonitorExtension/Info.plist

  # ──────────────────────────────────────────────
  # Shield Configuration Extension
  # ──────────────────────────────────────────────
  ShieldConfigurationExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: ShieldConfigurationExtension
      - path: Shared
    settings:
      base:
        INFOPLIST_FILE: ShieldConfigurationExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: ShieldConfigurationExtension/ShieldConfigurationExtension.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.ouchapp.app.shield-configuration
        GENERATE_INFOPLIST_FILE: true
        SWIFT_STRICT_CONCURRENCY: complete
    entitlements:
      path: ShieldConfigurationExtension/ShieldConfigurationExtension.entitlements
    info:
      path: ShieldConfigurationExtension/Info.plist

  # ──────────────────────────────────────────────
  # Shield Action Extension
  # ──────────────────────────────────────────────
  ShieldActionExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: ShieldActionExtension
      - path: Shared
    settings:
      base:
        INFOPLIST_FILE: ShieldActionExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: ShieldActionExtension/ShieldActionExtension.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.ouchapp.app.shield-action
        GENERATE_INFOPLIST_FILE: true
        SWIFT_STRICT_CONCURRENCY: complete
    entitlements:
      path: ShieldActionExtension/ShieldActionExtension.entitlements
    info:
      path: ShieldActionExtension/Info.plist

  # ──────────────────────────────────────────────
  # Tests
  # ──────────────────────────────────────────────
  OuchTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: OuchTests
    dependencies:
      - target: Ouch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ouchapp.app.tests
        GENERATE_INFOPLIST_FILE: true
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Ouch.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Ouch"
        BUNDLE_LOADER: "$(TEST_HOST)"
